spring:
  application:
    name: medical-shifts
  datasource:
    url: jdbc:postgresql://localhost:5432/turnos_medicos
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgresql.sql

server:
  port: 8081
