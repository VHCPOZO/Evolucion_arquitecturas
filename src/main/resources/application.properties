spring.application.name=medical-shifts

# ==========================================
# PostgreSQL Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:medical_shifts_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ==========================================
# SQL Initialization
# ==========================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.platform=h2

# Enable H2 console for quick inspection (http://localhost:8080/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA/Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Server Configuration
# ==========================================
server.port=8081
